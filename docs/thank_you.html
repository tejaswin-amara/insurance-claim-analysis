<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background-color: #0A192F;
            color: #CCD6F6;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            box-sizing: border-box;
        }
        .accent-line {
            position: absolute;
            bottom: 100px;
            width: 200px;
            height: 8px;
            background-color: #64FFDA;
        }
        .content-wrapper {
            text-align: center;
            width: 1000px;
        }
        .thank-you-text {
            font-size: 120px;
            font-weight: 900;
            color: #64FFDA;
            margin-bottom: 20px;
            letter-spacing: -4px;
        }
        .project-subtitle {
            font-size: 28px;
            color: #8892B0;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 60px;
        }
        .contact-info {
            font-size: 24px;
            color: #FFFFFF;
            margin-bottom: 80px;
        }
        .footer-info {
            border-top: 1px solid #172A45;
            padding-top: 40px;
            display: flex;
            justify-content: center;
            gap: 60px;
        }
        .info-item {
            font-size: 16px;
            color: #8892B0;
        }
        .info-label {
            color: #64FFDA;
            font-weight: 700;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="content-wrapper">
            <h1 class="thank-you-text">Thank You!</h1>
            <h2 class="project-subtitle">Insurance Claim Analysis | MDSA Capstone</h2>
            
            <p class="contact-info">tejaswinamara@klh.edu.in</p>
            
            <div class="footer-info">
                <div class="info-item">
                    <span class="info-label">Repository:</span> Project MDSA-Capstone-2026
                </div>
                <div class="info-item">
                    <span class="info-label">University:</span> KLH University (Bachupally Campus)
                </div>
            </div>
        </div>
        <div class="accent-line"></div>
    </div>
</body>
</html>
